<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Auth Screen -->
  <div id="screen-auth" class="screen">
    <div class="logo">meet buddy</div>
    <p class="subtitle">connect github to start</p>

    <div id="auth-setup" class="auth-section">
      <input type="text" id="client-id" placeholder="GitHub App Client ID" class="input" />
      <button id="btn-auth" class="btn btn-primary">Authenticate with GitHub</button>
    </div>

    <div id="auth-pending" class="auth-section" style="display: none;">
      <p class="device-code-label">Enter this code on GitHub:</p>
      <div id="device-code" class="device-code"></div>
      <a id="device-url" href="#" target="_blank" class="btn btn-secondary">Open GitHub</a>
      <p class="waiting">Waiting for authorization...</p>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="screen-main" class="screen" style="display: none;">
    <div class="header">
      <div class="logo-small">meet buddy</div>
      <button id="btn-settings" class="btn-icon" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>

    <!-- Repo Selector -->
    <div class="section">
      <label class="label">project repo</label>
      <select id="repo-select" class="select">
        <option value="">loading repos...</option>
      </select>
    </div>

    <!-- Idle State -->
    <div id="state-idle" class="state">
      <div class="status-badge idle">
        <span class="dot"></span> not in a meeting
      </div>
      <button id="btn-start" class="btn btn-primary btn-lg">Start Meeting Session</button>
    </div>

    <!-- Recording State -->
    <div id="state-recording" class="state" style="display: none;">
      <div class="status-badge recording">
        <span class="dot"></span> recording
      </div>
      <div class="meeting-title" id="meeting-title"></div>
      <div class="timer" id="timer">00:00:00</div>

      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="stat-words">0</span>
          <span class="stat-label">words</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-screenshots">0</span>
          <span class="stat-label">screenshots</span>
        </div>
      </div>
      <div class="live-indicator">
        <span class="live-dot"></span>
        <span id="sync-status">syncing live</span>
      </div>

      <div class="actions">
        <button id="btn-screenshot" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/>
          </svg>
          Screenshot
        </button>
        <button id="btn-end" class="btn btn-danger">End Session</button>
      </div>
    </div>

    <div class="footer">
      <span class="footer-text">by <a href="https://aumiqx.com" target="_blank">aumiqx</a></span>
      <button id="btn-logout" class="btn-text">logout</button>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
