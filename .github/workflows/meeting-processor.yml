name: Meet Buddy — Process Meeting Data

on:
  push:
    paths:
      - 'meetings/**'

permissions:
  contents: write
  issues: write

jobs:
  process-meeting:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[meet-buddy]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed meeting
        id: detect
        run: |
          MEETING_DIR=$(git diff --name-only HEAD~1 HEAD | grep '^meetings/' | head -1 | cut -d'/' -f1-2)
          if [ -z "$MEETING_DIR" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          MEETING_ID=$(echo "$MEETING_DIR" | cut -d'/' -f2)
          echo "meeting_dir=$MEETING_DIR" >> $GITHUB_OUTPUT
          echo "meeting_id=$MEETING_ID" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Check if meeting ended
        id: check
        if: steps.detect.outputs.skip != 'true'
        run: |
          META_FILE="${{ steps.detect.outputs.meeting_dir }}/meta.json"
          if [ -f "$META_FILE" ]; then
            END_TIME=$(jq -r '.endTime // empty' "$META_FILE")
            if [ -n "$END_TIME" ]; then
              echo "ended=true" >> $GITHUB_OUTPUT
              echo "title=$(jq -r '.title' "$META_FILE")" >> $GITHUB_OUTPUT
              echo "words=$(jq -r '.totalWords // 0' "$META_FILE")" >> $GITHUB_OUTPUT
              echo "screenshots=$(jq -r '.totalScreenshots // 0' "$META_FILE")" >> $GITHUB_OUTPUT
            else
              echo "ended=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate meeting summary
        if: steps.check.outputs.ended == 'true'
        run: |
          MEETING_DIR="${{ steps.detect.outputs.meeting_dir }}"
          MEETING_ID="${{ steps.detect.outputs.meeting_id }}"
          TITLE="${{ steps.check.outputs.title }}"
          WORDS="${{ steps.check.outputs.words }}"
          SCREENSHOTS="${{ steps.check.outputs.screenshots }}"
          TRANSCRIPT="$MEETING_DIR/transcript.md"

          # Generate a basic summary file
          cat > "$MEETING_DIR/summary.md" << SUMMARY
          # Meeting Summary: $TITLE

          - **ID:** $MEETING_ID
          - **Words captured:** $WORDS
          - **Screenshots:** $SCREENSHOTS
          - **Status:** Completed

          ## Transcript Preview

          $(head -50 "$TRANSCRIPT" 2>/dev/null || echo "No transcript available")

          ---
          _Generated by Meet Buddy GitHub Action_
          SUMMARY

          git config user.name "meet-buddy[bot]"
          git config user.email "meet-buddy[bot]@users.noreply.github.com"
          git add "$MEETING_DIR/summary.md"
          git commit -m "[meet-buddy] Summary: $TITLE" || true
          git push || true

      - name: Create meeting issue
        if: steps.check.outputs.ended == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ steps.check.outputs.title }}';
            const meetingId = '${{ steps.detect.outputs.meeting_id }}';
            const words = '${{ steps.check.outputs.words }}';
            const screenshots = '${{ steps.check.outputs.screenshots }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Meeting] ${title}`,
              body: [
                `## Meeting Completed: ${title}`,
                '',
                `| Metric | Value |`,
                `|--------|-------|`,
                `| Words captured | ${words} |`,
                `| Screenshots | ${screenshots} |`,
                `| Meeting ID | \`${meetingId}\` |`,
                '',
                `### Next Steps`,
                '',
                '- [ ] Review transcript',
                '- [ ] Extract action items',
                '- [ ] Create implementation tasks',
                '',
                `> Run \`meeting_transcript\` in Claude Code to analyze this meeting.`,
                '',
                '_Created by Meet Buddy_'
              ].join('\n'),
              labels: ['meeting', 'meet-buddy']
            });
